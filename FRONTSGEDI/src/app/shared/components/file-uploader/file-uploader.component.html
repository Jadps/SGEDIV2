<div class="relative group">
  <input type="file" [id]="id()" [accept]="accept()" class="hidden" (change)="handleFileChange($event)">
  <label [for]="id()" [ngClass]="containerClasses()"
    class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed transition-all cursor-pointer rounded-2xl bg-zinc-800/30 overflow-hidden">
    <div class="flex flex-col items-center justify-center pt-5 pb-6 px-4 text-center">
      <i [class]="iconClass()" class="text-3xl mb-3 transition-colors"></i>
      <p class="text-sm text-zinc-400 group-hover:text-zinc-300">
        <span [class]="labelClass()">{{ label() }}</span> o arrastra y suelta
      </p>
      <p class="text-xs text-zinc-500 mt-1" *ngIf="!selectedFile()">{{ description() }}</p>

      <div *ngIf="selectedFile()"
        class="mt-2 flex items-center gap-2 px-3 py-1.5 rounded-lg bg-emerald-500/10 border border-emerald-500/20">
        <i class="pi pi-check-circle text-emerald-400 text-xs"></i>
        <span class="text-xs text-emerald-400 font-medium truncate max-w-[200px]">
          {{ selectedFile()?.name }}
        </span>
        <button type="button" (click)="$event.preventDefault(); $event.stopPropagation(); clearFile()"
          class="ml-1 hover:text-white transition-colors">
          <i class="pi pi-times text-[10px]"></i>
        </button>
      </div>
    </div>

    <div *ngIf="isDragging()"
      class="absolute inset-0 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center border-2 border-dashed border-white/40 pointer-events-none">
      <div class="flex flex-col items-center gap-2">
        <i class="pi pi-download text-2xl text-white animate-bounce"></i>
        <span class="text-xs font-bold text-white uppercase tracking-widest">Soltar Archivo</span>
      </div>
    </div>
  </label>
</div>
