<p-dialog [visible]="visible()" (visibleChange)="!$event && onClose.emit()" [modal]="true" [draggable]="false"
    position="top" [style]="{ width: '500px', maxWidth: '95vw', marginTop: '4rem' }" [contentStyle]="{ padding: '0' }"
    appendTo="body" styleClass="crud-modal" maskStyleClass="backdrop-blur-md"
    [header]="loading() ? 'Cargando...' : (carrera()?.nombre || 'Nueva Carrera')">

    @if (loading()) {
    <div class="flex items-center justify-center py-20">
        <p-progressSpinner strokeWidth="3" styleClass="w-10 h-10" />
    </div>
    } @else if (carrera()) {
    <div class="p-6 space-y-6">
        <div class="space-y-4">
            <h3 class="text-lg font-semibold text-white/90 mb-4 flex items-center">
                <i class="pi pi-book mr-2 text-primary"></i> Información de la Carrera
            </h3>
            
            <div class="flex flex-col gap-2">
                <label for="clave" class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Clave</label>
                <input pInputText id="clave" [(ngModel)]="carrera()!.clave" class="crud-input" placeholder="Ej. ISIC-2010-224" />
            </div>

            <div class="flex flex-col gap-2">
                <label for="nombre" class="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Nombre de la Carrera</label>
                <input pInputText id="nombre" [(ngModel)]="carrera()!.nombre" class="crud-input" placeholder="Ej. Ingeniería en Sistemas Computacionales" />
            </div>
        </div>

        <div class="flex justify-end gap-3 mt-8 p-6 bg-black/20 border-t border-white/5">
            <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="onClose.emit()" styleClass="!text-zinc-400" />
            <p-button [label]="carreraId() ? 'Actualizar Carrera' : 'Guardar Carrera'" 
                      [icon]="carreraId() ? 'pi pi-save' : 'pi pi-check'" 
                      (onClick)="save()"
                      styleClass="rounded-xl px-8 shadow-lg shadow-primary/20" />
        </div>
    </div>
    }
</p-dialog>
