<p-dialog [visible]="visible()" (visibleChange)="!$event && onClose.emit()" [modal]="true" [draggable]="false"
    position="top" [style]="{ width: '500px', maxWidth: '95vw', marginTop: '4rem' }" [contentStyle]="{ padding: '0' }"
    appendTo="body"
    styleClass="carrera-modal glass-dark border border-white/10 rounded-3xl overflow-hidden shadow-2xl"
    [header]="loading() ? 'Cargando...' : (carrera()?.nombre || 'Nueva Carrera')">

    @if (loading()) {
    <div class="flex items-center justify-center py-20">
        <p-progressSpinner strokeWidth="3" styleClass="w-10 h-10" />
    </div>
    } @else if (carrera()) {
    <div class="p-6 space-y-6">
        <div class="space-y-4">
            <h3 class="text-lg font-semibold text-white/90 mb-4 flex items-center">
                <i class="pi pi-book mr-2 text-primary"></i> Información de la Carrera
            </h3>
            
            <div class="flex flex-col gap-2">
                <label for="clave" class="text-sm font-medium text-zinc-400">Clave</label>
                <input pInputText id="clave" [(ngModel)]="carrera()!.clave" class="w-full" placeholder="Ej. ISIC-2010-224" />
            </div>

            <div class="flex flex-col gap-2">
                <label for="nombre" class="text-sm font-medium text-zinc-400">Nombre de la Carrera</label>
                <input pInputText id="nombre" [(ngModel)]="carrera()!.nombre" class="w-full" placeholder="Ej. Ingeniería en Sistemas Computacionales" />
            </div>
        </div>

        <div class="flex justify-end gap-3 mt-8">
            <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="onClose.emit()" />
            <p-button [label]="carreraId() ? 'Actualizar Carrera' : 'Guardar Carrera'" 
                      [icon]="carreraId() ? 'pi pi-save' : 'pi pi-check'" 
                      (onClick)="save()" />
        </div>
    </div>
    }
</p-dialog>
