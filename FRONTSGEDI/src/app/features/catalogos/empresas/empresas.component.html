<div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex flex-col gap-2">
            <h1 class="text-3xl font-bold tracking-tight text-zinc-900 dark:text-white">Empresas</h1>
            <p class="text-zinc-500 dark:text-zinc-400">Administra y gestiona el catálogo de empresas registradas.
            </p>
        </div>

        <div class="flex items-center gap-3">
            <p-iconfield>
                <p-inputicon class="pi pi-search"></p-inputicon>
                <input pInputText type="text" placeholder="Buscar empresa..." (input)="onSearch($event)"
                    class="w-full md:w-64 rounded-2xl glass-dark border-white/10" />
            </p-iconfield>
            <p-button label="Nueva Empresa" icon="pi pi-plus" (onClick)="openNew()" styleClass="rounded-2xl" />
        </div>
    </div>

    <div class="rounded-3xl glass-dark border-white/10 overflow-hidden shadow-2xl">
        <p-table [value]="filteredEmpresas()" [loading]="loading()" [rows]="10" [paginator]="true"
            [showCurrentPageReport]="true"
            currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} empresas"
            styleClass="p-datatable-sm custom-table">

            <ng-template pTemplate="header">
                <tr class="!bg-transparent border-b border-white/5">
                    <th
                        class="!bg-transparent text-zinc-500 dark:text-zinc-400 font-semibold uppercase tracking-wider text-[11px] py-4 pl-6">
                        Nombre de la Empresa
                    </th>
                    <th
                        class="!bg-transparent text-zinc-500 dark:text-zinc-400 font-semibold uppercase tracking-wider text-[11px] py-4">
                        RFC
                    </th>
                    <th
                        class="!bg-transparent text-zinc-500 dark:text-zinc-400 font-semibold uppercase tracking-wider text-[11px] py-4">
                        Contacto
                    </th>
                    <th
                        class="!bg-transparent text-zinc-500 dark:text-zinc-400 font-semibold uppercase tracking-wider text-[11px] py-4">
                        Acciones
                    </th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-empresa>
                <tr class="!bg-transparent hover:!bg-white/5 transition-colors group">
                    <td class="py-4 pl-6 cursor-pointer" (click)="editEmpresa(empresa)">
                        <div class="flex items-center gap-3 group/name">
                            <div
                                class="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center text-primary text-xs font-bold border border-primary/20">
                                {{ empresa.nombre.substring(0, 1) }}
                            </div>
                            <span
                                class="text-zinc-900 dark:text-zinc-200 font-medium group-hover/name:text-primary transition-colors">
                                {{ empresa.nombre }}
                            </span>
                            <i
                                class="pi pi-arrow-up-right text-[10px] text-zinc-500 opacity-0 group-hover/name:opacity-100 transition-opacity"></i>

                        </div>
                    </td>
                    <td class="py-4">
                        <span class="font-mono text-zinc-500 dark:text-zinc-400 text-sm">{{ empresa.rfc }}</span>
                    </td>
                    <td class="py-4">
                        <div class="flex flex-col text-xs">
                            <span class="text-zinc-400 font-medium">{{ empresa.correo }}</span>
                            <span class="text-zinc-500">{{ empresa.telefono }}</span>
                        </div>
                    </td>
                    <td class="py-4">
                        <div class="flex gap-2">

                            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" size="small"
                                (onClick)="deleteEmpresa(empresa.id)" pTooltip="Eliminar" tooltipPosition="top" />
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="4" class="py-20 text-center">
                        <div class="flex flex-col items-center gap-3">
                            <i class="pi pi-building text-4xl text-zinc-700"></i>
                            <p class="text-zinc-500">No se encontraron empresas registradas.</p>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</div>

<app-empresa-detail-modal [visible]="displayDetail()" [empresaId]="selectedEmpresaId()"
    (onClose)="displayDetail.set(false)" (onSaved)="loadEmpresas()" />
