<div class="pt-4">
  @if (loading()) {
    <div class="py-20 text-center">
      <i class="pi pi-spin pi-spinner text-2xl text-blue-400"></i>
      <p class="text-zinc-500 text-sm mt-2">Cargando detalles del contrato...</p>
    </div>
  } @else {
    @if (contratoActual()) {
      <app-contrato-resumen 
        [contrato]="contratoActual()!" 
        [canRespond]="isStudent()"
        (onResponded)="loadContrato()" />
    } @else {
      <div class="p-12 flex flex-col items-center justify-center text-center space-y-4 animate-fade-in-up">
        <div class="w-20 h-20 rounded-full bg-zinc-800/50 flex items-center justify-center border border-white/5 shadow-inner">
          <i class="pi pi-file-pdf text-4xl text-zinc-600"></i>
        </div>
        <div class="space-y-2">
          <h3 class="text-xl font-bold text-white tracking-tight">Gestión de Contratos</h3>
          <p class="text-zinc-500 text-sm max-w-[400px]">
            Aún no hay un contrato de evaluación definido para esta materia. Una vez que el profesor genere los criterios, el alumno podrá verlos y aceptarlos.
          </p>
        </div>
      </div>
    }
  }
</div>
