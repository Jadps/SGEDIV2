<p-dialog [visible]="visible()" (visibleChange)="!$event && onClose.emit()" [modal]="true" [draggable]="false"
    position="top" [style]="{ width: '600px', maxWidth: '95vw', marginTop: '4rem' }" [contentStyle]="{ padding: '0' }"
    appendTo="body" styleClass="user-modal glass-dark border border-white/10 rounded-3xl overflow-hidden shadow-2xl"
    [header]="loading() ? 'Cargando...' : (user()?.name || 'Nuevo Usuario Interno')">

    @if (loading()) {
    <div class="flex items-center justify-center py-20">
        <p-progressSpinner strokeWidth="3" styleClass="w-10 h-10" />
    </div>
    } @else if (user()) {
    <div class="p-6 space-y-6">
        <div class="space-y-4">
            <h3 class="text-lg font-semibold text-white/90 mb-4 flex items-center">
                <i class="pi pi-user mr-2 text-primary"></i> Datos del Usuario
            </h3>

            <div class="flex flex-col gap-2">
                <label for="name" class="text-sm font-medium text-zinc-400">Nombre Completo</label>
                <input pInputText id="name" [(ngModel)]="user()!.name" class="w-full" placeholder="Ej. Juan Pérez" />
            </div>
            @if (!userId()) {
            <div class="flex flex-col gap-2">
                <label for="password" class="text-sm font-medium text-zinc-400">Contraseña Temporal</label>
                <input pInputText type="password" id="password" [(ngModel)]="user()!.password" class="w-full"
                    autocomplete="new-password" />
            </div>
            }
            <div class="flex flex-col gap-2">
                <label for="email" class="text-sm font-medium text-zinc-400">Correo Institucional</label>
                <input pInputText id="email" [(ngModel)]="user()!.email" class="w-full" placeholder="usuario@tecnm.mx"
                    autocomplete="nope" />
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-sm font-medium text-zinc-400">Roles Asignados</label>
                <p-multiSelect [options]="availableRoles()" [(ngModel)]="user()!.roles" optionLabel="label"
                    optionValue="value" placeholder="Seleccionar Roles" class="w-full" appendTo="body" />
            </div>

            @if (hasRole('Coordinador') || hasRole('Jefe de Departamento')) {
            <div class="flex flex-col gap-2 animate-in fade-in slide-in-from-top-2">
                <label for="carrera" class="text-sm font-medium text-zinc-400">
                    {{ hasRole('Coordinador') ? 'Carrera a Coordinar' : 'Carrera del Departamento' }}
                </label>
                <p-select [options]="carreras()" [(ngModel)]="user()!.carreraId" optionLabel="nombre" optionValue="id"
                    placeholder="Seleccionar Carrera" [showClear]="true" class="w-full" appendTo="body" />
            </div>
            }

            @if (hasRole('Asesor Interno') || hasRole('Profesor')) {
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 animate-in fade-in slide-in-from-top-2">
                <div class="flex flex-col gap-2">
                    <label for="emp" class="text-sm font-medium text-zinc-400">Número de Empleado</label>
                    <input pInputText id="emp" [(ngModel)]="user()!.numeroEmpleado" class="w-full" />
                </div>
                <div class="flex flex-col gap-2">
                    <label for="cub" class="text-sm font-medium text-zinc-400">Cubículo / Oficina</label>
                    <input pInputText id="cub" [(ngModel)]="user()!.cubiculo" class="w-full" />
                </div>
            </div>
            }

            @if (userId()) {
            <div class="flex items-center gap-3 pt-4 border-t border-white/5">
                <p-checkbox [(ngModel)]="user()!.isActive" [binary]="true" inputId="active" />
                <label for="active" class="text-sm font-medium text-zinc-300">Usuario Activo en el Sistema</label>
            </div>
            }
        </div>

        <div class="flex justify-end gap-3 mt-8">
            <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="onClose.emit()" />
            <p-button [label]="userId() ? 'Actualizar Usuario' : 'Guardar Usuario'"
                [icon]="userId() ? 'pi pi-save' : 'pi pi-check'" (onClick)="save()" />
        </div>
    </div>
    }
</p-dialog>
