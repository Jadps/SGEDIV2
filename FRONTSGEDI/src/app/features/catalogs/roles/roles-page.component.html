<div class="card">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-6">
        <div>
            <h1 class="text-2xl font-bold m-0 text-slate-900 dark:text-white">Gestión de Roles</h1>
            <p class="text-slate-500 dark:text-slate-400 m-0">Define niveles de acceso y permisos por módulo.</p>
        </div>
        <button pButton label="Nuevo Rol" icon="pi pi-plus" class="p-button-primary" (click)="onOpenDialog()"></button>
    </div>

    <p-table [value]="manager.roles()" [loading]="manager.isTableLoading()" [rows]="10" [paginator]="true"
        styleClass="p-datatable-sm" responsiveLayout="scroll">

        <ng-template pTemplate="header">
            <tr>
                <th pSortableColumn="name">Nombre <p-sortIcon field="name"></p-sortIcon></th>
                <th pSortableColumn="description">Descripción <p-sortIcon field="description"></p-sortIcon></th>
                <th class="w-24 text-center">Acciones</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-role>
            <tr class="hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors duration-200">
                <td class="font-medium p-3">
                    <div class="flex items-center gap-2">
                        <i class="pi pi-id-card text-blue-500"></i>
                        {{ role.name }}
                    </div>
                </td>
                <td class="p-3 text-slate-600 dark:text-slate-400">{{ role.description }}</td>
                <td class="text-center p-3">
                    <button pButton icon="pi pi-pencil" 
                        class="p-button-rounded p-button-text p-button-info p-1"
                        (click)="onEdit(role)"
                        pTooltip="Editar Rol"
                        tooltipPosition="left">
                    </button>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="loadingbody">
            <tr *ngFor="let item of [1,2,3,4,5]">
                <td><p-skeleton width="60%"></p-skeleton></td>
                <td><p-skeleton width="80%"></p-skeleton></td>
                <td><p-skeleton shape="circle" size="2rem" styleClass="mx-auto"></p-skeleton></td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center p-12">
                    <i class="pi pi-folder-open text-4xl text-slate-300 mb-3 block"></i>
                    <span class="text-slate-500">No se encontraron roles configurados.</span>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<app-role-form-dialog></app-role-form-dialog>
