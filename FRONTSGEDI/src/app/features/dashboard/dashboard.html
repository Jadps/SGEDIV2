<div class="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">

    @if (authService.currentUser(); as user) {
    <div class="flex flex-col gap-2">
        <h1 class="text-3xl font-bold tracking-tight text-zinc-900 dark:text-white">Dashboard</h1>
        <p class="text-zinc-500 dark:text-zinc-400">¡Bienvenido de nuevo, <span
                class="text-blue-600 dark:text-blue-400 font-semibold">{{ user.fullName
                }}</span>!</p>
    </div>

    <div class="rounded-3xl glass-dark border-white/10 overflow-hidden">
        <div class="p-6 border-b border-black/5 dark:border-white/5 flex justify-between items-center">
            <h2 class="text-lg font-bold text-zinc-900 dark:text-white">Información de Sesión</h2>
            <button
                class="text-xs font-bold text-blue-600 dark:text-blue-500 hover:text-blue-500 dark:hover:text-blue-400 transition-colors uppercase tracking-widest">Ver
                Perfil</button>
        </div>
        <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-4">
                <div class="flex flex-col gap-1">
                    <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Rol Actual</p>
                    <p class="text-zinc-700 dark:text-zinc-200 font-medium">{{ user.roles[0] || 'Sin rol' }}</p>
                </div>
                <div class="flex flex-col gap-1">
                    <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Email Corporativo</p>
                    <p class="text-zinc-700 dark:text-zinc-200 font-medium">{{ user.email }}</p>
                </div>
            </div>
        </div>
    </div>

    } @else {
    <div class="flex flex-col items-center justify-center py-20 gap-4">
        <p-progressSpinner styleClass="w-12 h-12" strokeWidth="3" fill="transparent"
            animationDuration=".5s"></p-progressSpinner>
        <p class="text-zinc-500 animate-pulse font-medium">Sincronizando datos...</p>
    </div>
    }
</div>
